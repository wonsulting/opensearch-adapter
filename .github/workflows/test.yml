name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} / illuminate ${{ matrix.illuminate }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        illuminate: ['^11.0', '^12.0', '^13.0']
        exclude:
          - php: '8.2'
            illuminate: '^13.0'   # Laravel 13 requires PHP >= 8.3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install php and composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Restore composer cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.illuminate }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Pin illuminate/support for this cell
        run: composer require "illuminate/support:${{ matrix.illuminate }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --no-interaction --prefer-stable

      - name: Run tests
        run: composer test

